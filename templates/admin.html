{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 class="card-title">管理面板</h2>

    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}

    {% if users %}
        <table class="search-results-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>用户名</th>
                    <th>邮箱</th>
                    <th>手机</th>
                    <th>余额</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for u in users %}
                <tr>
                    <td>{{ u.id }}</td>
                    <td>{{ u.username }}</td>
                    <td>{{ u.email }}</td>
                    <td>{{ u.phone }}</td>
                    <td>{{ u.balance }}</td>
                    <td>
                        <a href="/profile?user_id={{ u.id }}" class="btn btn-primary" style="padding: 4px 12px; font-size: 13px;">查看</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% endif %}

    <div class="action-bar" style="margin-top: 24px; text-align: center;">
        <a href="/" class="btn btn-primary">返回首页</a>
    </div>
</div>
{% endblock %}
